<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">멀티모달 RAG의 다음 레이어 효과</title>
  <desc id="desc">긴 비전 출력, 모델 다운그레이드, semantic chunking이 각각 비용, 한도, 실패 모드, rate limit, rollback, trace 문제로 이어지는 도식.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9fafb"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="28" fill="url(#bg)"/>
  <text x="70" y="76" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">한 레이어의 개선은 다음 레이어의 조건이 된다</text>
  <text x="70" y="112" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" fill="#475569">따로 보면 개선처럼 보였던 변경이 다음 단계에서는 입력, 한도, 실패 모드로 다시 나타났다.</text>

  <g filter="url(#shadow)">
    <rect x="76" y="178" width="300" height="360" rx="20" fill="#ffffff"/>
    <rect x="102" y="206" width="248" height="54" rx="14" fill="#fef3c7"/>
    <text x="126" y="241" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#92400e">긴 비전 출력</text>
    <line x1="226" y1="278" x2="226" y2="326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="112" y="342" width="228" height="52" rx="14" fill="#fee2e2"/>
    <text x="136" y="375" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">vision 비용 증가</text>
    <rect x="112" y="414" width="228" height="52" rx="14" fill="#dbeafe"/>
    <text x="136" y="447" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">embedding 한도 초과</text>
    <text x="112" y="504" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#64748b">같은 출력, 두 증상.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="178" width="300" height="360" rx="20" fill="#ffffff"/>
    <rect x="476" y="206" width="248" height="54" rx="14" fill="#e0f2fe"/>
    <text x="506" y="241" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#0369a1">모델 다운그레이드</text>
    <line x1="600" y1="278" x2="600" y2="326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="486" y="342" width="228" height="52" rx="14" fill="#fee2e2"/>
    <text x="510" y="375" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">실패 모드 변경</text>
    <rect x="486" y="414" width="228" height="52" rx="14" fill="#f3e8ff"/>
    <text x="510" y="447" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#6b21a8">rate limit 압박</text>
    <text x="486" y="504" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#64748b">싼 경로에도 정책이 필요하다.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="824" y="178" width="300" height="360" rx="20" fill="#ffffff"/>
    <rect x="850" y="206" width="248" height="54" rx="14" fill="#dcfce7"/>
    <text x="876" y="241" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="18" font-weight="700" fill="#166534">semantic chunking</text>
    <line x1="974" y1="278" x2="974" y2="326" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="860" y="342" width="228" height="52" rx="14" fill="#fef3c7"/>
    <text x="884" y="375" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">rollback 필요</text>
    <rect x="860" y="414" width="228" height="52" rx="14" fill="#e0f2fe"/>
    <text x="884" y="447" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" font-weight="700" fill="#0369a1">trace 분리 필요</text>
    <text x="860" y="504" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="14" fill="#64748b">알고리즘은 일부일 뿐.</text>
  </g>

  <text x="70" y="604" font-family="Inter, Apple SD Gothic Neo, Arial, sans-serif" font-size="16" fill="#64748b">디버깅 질문은 바뀌었다. 이 개선은 다음 레이어에 어떤 입력으로 도착하는가?</text>
</svg>
