<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blog — 시안</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f7f5ef;
    --surface: #f3f0e8;
    --ink: #1a1a17;
    --ink-2: #3a3833;
    --ink-3: #6b6960;
    --ink-4: #9a978c;
    --rule: rgba(26,26,23,.10);
    --rule-soft: rgba(26,26,23,.06);

    /* olive/green accent */
    --accent: oklch(0.58 0.13 140);
    --accent-soft: oklch(0.58 0.13 140 / .16);
    --accent-ink: oklch(0.44 0.12 140);

    --serif: 'Newsreader', ui-serif, Georgia, serif;
    --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

    --body-font: var(--sans);
    --measure: 680px;
    --fs-body: 17px;
  }
  [data-theme="dark"] {
    --bg: #14140f;
    --surface: #1c1c16;
    --ink: #efeee6;
    --ink-2: #d6d3c6;
    --ink-3: #908d80;
    --ink-4: #5e5c54;
    --rule: rgba(239,238,230,.10);
    --rule-soft: rgba(239,238,230,.06);
    --accent: oklch(0.78 0.10 130);
    --accent-soft: oklch(0.78 0.10 130 / .14);
    --accent-ink: oklch(0.85 0.09 130);
  }

  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    margin: 0;
    font-family: var(--sans);
    font-size: var(--fs-body);
    line-height: 1.75;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "ss02";
  }
  ::selection { background: var(--accent-soft); color: var(--ink); }

  a { color: inherit; text-decoration: none; }
  a.link { color: var(--accent-ink); }
  a.link:hover { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }

  /* ── Layout shell ───────────────────────────────────── */
  .shell {
    max-width: calc(var(--measure) + 96px);
    margin: 0 auto;
    padding: 56px 48px 160px;
  }
  @media (max-width: 720px) {
    .shell { padding: 40px 22px 120px; }
  }

  /* ── Top bar ────────────────────────────────────────── */
  .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 96px;
  }
  .brand {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink);
    line-height: 1;
  }
  .brand .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    flex-shrink: 0;
  }
  nav.nav { display: flex; gap: 24px; align-items: center; }
  nav.nav button {
    appearance: none; background: transparent; border: 0; padding: 0;
    font: inherit; font-size: 14px; color: var(--ink-3);
    cursor: pointer; letter-spacing: -0.005em;
    transition: color .15s;
    position: relative;
    line-height: 1;
  }
  nav.nav button:hover { color: var(--ink-2); }
  nav.nav button[aria-current="page"] { color: var(--ink); }
  nav.nav button[aria-current="page"]::after {
    content: ""; position: absolute; left: 50%; bottom: -8px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); transform: translateX(-50%);
  }

  /* ── Generic prose ─────────────────────────────────── */
  .prose { max-width: var(--measure); font-family: var(--body-font); }
  .prose p { margin: 0 0 1.4em; color: var(--ink-2); }
  .prose p.lead { font-size: 1.05em; color: var(--ink); }
  .prose h1, .prose h2, .prose h3 {
    font-family: var(--sans); letter-spacing: -0.025em; color: var(--ink);
    font-weight: 600;
  }
  .prose h1 { font-size: 32px; line-height: 1.25; margin: 0 0 24px; }
  .prose h2 { font-size: 21px; line-height: 1.35; margin: 56px 0 14px; }
  .prose h3 { font-size: 17px; line-height: 1.4; margin: 32px 0 10px; }
  .prose blockquote {
    margin: 32px 0; padding: 2px 0 2px 18px;
    border-left: 2px solid var(--accent);
    color: var(--ink-3); font-style: italic;
  }
  .prose code {
    font-family: var(--mono); font-size: 0.86em;
    background: var(--surface); padding: 2px 6px; border-radius: 4px;
    color: var(--ink-2);
  }
  .prose pre {
    font-family: var(--mono); font-size: 13.5px; line-height: 1.7;
    background: var(--surface); padding: 18px 20px; border-radius: 6px;
    overflow-x: auto; margin: 24px 0; color: var(--ink-2);
    border: .5px solid var(--rule);
  }
  .prose pre code { background: transparent; padding: 0; }
  .prose hr { border: 0; border-top: .5px solid var(--rule); margin: 56px 0; }

  /* lists */
  .prose ul, .prose ol { margin: 0 0 1.4em; padding: 0 0 0 1.2em; color: var(--ink-2); }
  .prose ul li, .prose ol li { margin: .35em 0; padding-left: .25em; }
  .prose ul { list-style: none; padding-left: 0; }
  .prose ul > li { padding-left: 1.4em; position: relative; }
  .prose ul > li::before {
    content: ""; position: absolute; left: .35em; top: .82em;
    width: 5px; height: 1px; background: var(--ink-4);
  }
  .prose ol { list-style: none; counter-reset: ol; padding-left: 0; }
  .prose ol > li { padding-left: 2.2em; position: relative; counter-increment: ol; }
  .prose ol > li::before {
    content: counter(ol) ".";
    position: absolute; left: 0; top: 0;
    font-family: var(--mono); font-size: .85em; color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    width: 1.7em; text-align: right;
  }
  .prose li > ul, .prose li > ol { margin: .4em 0 .2em; }

  /* checklist */
  .prose ul.task { padding-left: 0; }
  .prose ul.task > li { padding-left: 1.8em; }
  .prose ul.task > li::before {
    content: ""; left: 0; top: .5em;
    width: 13px; height: 13px; border-radius: 3px;
    border: .5px solid var(--rule); background: transparent;
  }
  .prose ul.task > li.done::before {
    background: var(--accent); border-color: transparent;
  }
  .prose ul.task > li.done::after {
    content: ""; position: absolute; left: 3px; top: .82em;
    width: 7px; height: 4px;
    border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg);
    transform: rotate(-45deg);
  }
  .prose ul.task > li.done { color: var(--ink-4); text-decoration: line-through; text-decoration-color: var(--ink-4); }

  /* tables */
  .prose table {
    width: 100%; border-collapse: collapse; margin: 28px 0;
    font-size: .92em; font-family: var(--sans);
  }
  .prose th, .prose td {
    text-align: left; padding: 10px 14px;
    border-bottom: .5px solid var(--rule-soft);
    vertical-align: top;
  }
  .prose th {
    font-weight: 500; color: var(--ink-3);
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: .5px solid var(--rule);
    padding-top: 6px;
  }
  .prose td { color: var(--ink-2); }
  .prose td code { font-size: .92em; }

  /* keyboard */
  .prose kbd {
    font-family: var(--mono); font-size: .78em;
    padding: 2px 7px; border-radius: 4px;
    background: var(--surface);
    border: .5px solid var(--rule);
    border-bottom-width: 1.5px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
  }

  /* callouts */
  .prose .callout {
    display: grid; grid-template-columns: 22px 1fr; gap: 12px;
    margin: 28px 0; padding: 16px 18px;
    background: var(--surface);
    border: .5px solid var(--rule-soft);
    border-radius: 6px;
    color: var(--ink-2); font-size: .96em; line-height: 1.65;
  }
  .prose .callout .ico {
    font-family: var(--mono); font-size: 13px; color: var(--accent-ink);
    line-height: 1.7;
  }
  .prose .callout p { margin: 0; }
  .prose .callout p + p { margin-top: .6em; }
  .prose .callout.warn { border-color: var(--rule); }
  .prose .callout.warn .ico { color: oklch(0.62 0.14 50); }

  /* image figures */
  .prose figure {
    margin: 32px 0; padding: 0;
  }
  .prose figure .img-ph {
    aspect-ratio: 16 / 9; width: 100%; border-radius: 6px;
    background:
      repeating-linear-gradient(135deg,
        var(--surface) 0 8px, transparent 8px 16px),
      var(--surface);
    border: .5px solid var(--rule-soft);
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-4); font-family: var(--mono); font-size: 12px;
    letter-spacing: 0.04em;
  }
  .prose figure figcaption {
    margin-top: 10px; font-size: 13px; color: var(--ink-4);
    text-align: center; font-family: var(--sans);
  }

  /* tighter h-spacing in posts */
  .prose h2 + p, .prose h3 + p { margin-top: 0; }
  .prose h2 + .callout, .prose h2 + pre { margin-top: 4px; }

  /* footnote */
  .prose .footnotes {
    margin-top: 56px; padding-top: 24px;
    border-top: .5px solid var(--rule-soft);
    font-size: 13.5px; color: var(--ink-3);
  }
  .prose .footnotes ol > li { padding-left: 2em; }
  .prose sup.fn-ref {
    font-size: .7em; color: var(--accent-ink);
    margin: 0 1px 0 1px; vertical-align: super; line-height: 0;
  }

  /* code block with filename header */
  .prose .code-block { margin: 24px 0; }
  .prose .code-block .filename {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11.5px;
    color: var(--ink-4);
    background: var(--surface);
    padding: 6px 12px;
    border: .5px solid var(--rule);
    border-bottom: 0;
    border-radius: 6px 6px 0 0;
  }
  .prose .code-block .filename .lang {
    color: var(--accent-ink); letter-spacing: 0.04em;
  }
  .prose .code-block pre {
    margin-top: 0;
    border-top-left-radius: 0;
  }

  /* syntax highlight tokens (manual) */
  .tk-c { color: var(--ink-4); font-style: italic; }
  .tk-k { color: oklch(0.55 0.14 280); }
  [data-theme="dark"] .tk-k { color: oklch(0.78 0.12 280); }
  .tk-s { color: oklch(0.50 0.10 130); }
  [data-theme="dark"] .tk-s { color: oklch(0.78 0.10 130); }
  .tk-n { color: oklch(0.55 0.12 30); }
  [data-theme="dark"] .tk-n { color: oklch(0.78 0.10 30); }
  .tk-t { color: oklch(0.50 0.10 220); }
  [data-theme="dark"] .tk-t { color: oklch(0.78 0.10 220); }
  .tk-f { color: oklch(0.50 0.12 60); }
  [data-theme="dark"] .tk-f { color: oklch(0.80 0.10 60); }

  /* serif body variant */
  body[data-body-font="serif"] .prose,
  body[data-body-font="serif"] .article-list .meta {
    font-family: var(--serif);
  }
  body[data-body-font="serif"] .prose p,
  body[data-body-font="serif"] .article-list .article-title {
    letter-spacing: 0;
  }

  /* ── Home ──────────────────────────────────────────── */
  .home-intro {
    font-family: var(--sans);
    font-size: 19px;
    line-height: 1.7;
    letter-spacing: -0.012em;
    color: var(--ink);
    max-width: 560px;
    margin-bottom: 72px;
  }
  .home-intro .muted { color: var(--ink-3); }
  .home-intro .accent { color: var(--accent-ink); }

  .section-label {
    font-family: var(--sans);
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 22px;
  }

  /* ── Article list ──────────────────────────────────── */
  .article-list { display: flex; flex-direction: column; }
  .year-block + .year-block { margin-top: 40px; }
  .year {
    font-family: var(--mono);
    font-size: 12px; letter-spacing: 0.04em;
    color: var(--ink-4);
    padding-bottom: 10px;
    margin-bottom: 6px;
    border-bottom: .5px solid var(--rule-soft);
  }
  .article-list a.row {
    display: grid;
    grid-template-columns: 1fr 72px;
    gap: 16px;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: .5px solid var(--rule-soft);
    transition: padding .15s;
  }
  .article-list a.row:hover { padding-left: 8px; }
  .article-list a.row:hover .article-title { color: var(--accent-ink); }
  .article-list .article-title {
    font-family: var(--sans);
    font-size: 16.5px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.01em;
    transition: color .15s;
  }
  .article-list .article-desc {
    display: block;
    font-size: 13.5px; color: var(--ink-3); font-weight: 400;
    margin-top: 4px; letter-spacing: -0.005em;
  }
  .article-list .meta {
    font-family: var(--mono);
    font-size: 12px; color: var(--ink-4);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ── Thumbnail variants ────────────────────────────── */
  /* Shared: every cover renders as a striped placeholder if no src */
  .cv {
    background:
      repeating-linear-gradient(135deg,
        color-mix(in srgb, var(--accent) 18%, transparent) 0 6px,
        transparent 6px 12px),
      var(--surface);
    background-size: cover;
    border: .5px solid var(--rule-soft);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .cv.has-img {
    background: var(--surface) center/cover no-repeat;
  }

  /* ── Variant A: aside (right side, small thumbnail at title baseline) */
  .article-list[data-thumb="aside"] a.row {
    grid-template-columns: 1fr auto auto;
    gap: 20px;
    align-items: center;
    padding: 14px 0;
    min-height: 56px;
  }
  .article-list[data-thumb="aside"] a.row .meta {
    order: 2;
  }
  .article-list[data-thumb="aside"] .cv {
    width: 56px; height: 42px;          /* 4:3, sized to match a single text row */
    border-radius: 4px;
    order: 3;
  }
  /* When no thumb, leave a same-sized empty slot so columns align across rows */
  .article-list[data-thumb="aside"] a.row .cv-spacer {
    width: 56px; height: 42px;
    order: 3;
  }
  .article-list[data-thumb="aside"] .meta { line-height: 1; min-width: 56px; text-align: right; }

  /* ── Variant B: leading (left thumbnail slot, fixed width — empty slot for no-thumb) */
  .article-list[data-thumb="leading"] a.row {
    grid-template-columns: 64px 1fr 72px;
    align-items: center;
    gap: 20px;
  }
  .article-list[data-thumb="leading"] .cv {
    width: 64px; height: 48px;
  }
  /* For no-thumb rows: replace cover with a quiet monogram chip */
  .article-list[data-thumb="leading"] .mono-chip {
    width: 64px; height: 48px; border-radius: 4px;
    border: .5px solid var(--rule-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 10.5px; letter-spacing: 0.08em;
    color: var(--ink-4);
    text-transform: uppercase;
    background: transparent;
  }

  /* ── Variant C: inline (no thumb in row; small dot indicator + hover preview) */
  .article-list[data-thumb="inline"] a.row {
    grid-template-columns: 1fr 72px;
    position: relative;
  }
  .article-list[data-thumb="inline"] .has-cover-dot {
    display: inline-block;
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    margin-right: 8px; transform: translateY(-2px);
  }
  .article-list[data-thumb="inline"] .hover-preview {
    position: absolute;
    right: 88px; top: 50%;
    transform: translateY(-50%) translateX(4px);
    width: 120px; height: 80px;
    border-radius: 4px; overflow: hidden;
    border: .5px solid var(--rule);
    box-shadow: 0 12px 32px -16px rgba(0,0,0,.25), 0 2px 8px -4px rgba(0,0,0,.08);
    opacity: 0; pointer-events: none;
    transition: opacity .18s ease, transform .18s ease;
    background: var(--surface) center/cover no-repeat;
    z-index: 2;
  }
  .article-list[data-thumb="inline"] a.row:hover .hover-preview {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
  }

  /* ── Variant D: magazine (rows w/ cover become wide cards; no-thumb stays text) */
  .article-list[data-thumb="magazine"] a.row.with-cover {
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 28px 0;
    border-bottom: .5px solid var(--rule-soft);
  }
  .article-list[data-thumb="magazine"] a.row.with-cover .mag-cover {
    width: 100%; aspect-ratio: 16 / 7;
    border-radius: 6px;
  }
  .article-list[data-thumb="magazine"] a.row.with-cover .mag-body {
    display: grid; grid-template-columns: 1fr 72px;
    gap: 16px; align-items: baseline;
  }
  .article-list[data-thumb="magazine"] a.row.with-cover:hover {
    padding-left: 0; /* don't shift the wide card */
  }
  .article-list[data-thumb="magazine"] a.row.with-cover:hover .mag-cover {
    transform: scale(1.005);
  }
  .article-list[data-thumb="magazine"] .mag-cover {
    transition: transform .3s ease;
  }

  /* ── Variant E: peek (a sliver on the right; expands on hover) */
  .article-list[data-thumb="peek"] a.row {
    grid-template-columns: 1fr 72px 6px;
    gap: 16px;
    align-items: stretch;
    padding: 16px 0;
    position: relative;
  }
  .article-list[data-thumb="peek"] .peek-strip {
    width: 6px; align-self: stretch;
    border-radius: 2px;
    transition: width .25s ease, margin .25s ease;
    background: var(--surface) center/cover no-repeat;
    border: .5px solid var(--rule-soft);
    min-height: 28px;
  }
  .article-list[data-thumb="peek"] a.row:hover .peek-strip.has-img {
    width: 56px;
    margin-left: -50px;
  }
  .article-list[data-thumb="peek"] .peek-strip.empty {
    background: transparent;
    border-color: var(--rule-soft);
    border-style: dashed;
    opacity: .5;
  }
  .article-list[data-thumb="peek"] a.row > div:nth-child(1) { align-self: center; }
  .article-list[data-thumb="peek"] a.row > div:nth-child(2) { align-self: center; }

  /* featured (compact) */
  .featured { margin-bottom: 72px; }
  .featured .row { padding: 12px 0; }
  .featured .article-title { font-weight: 500; font-size: 16px; }

  /* ── Article (post) page ──────────────────────────── */
  .post-meta {
    display: flex; gap: 14px; align-items: center;
    font-family: var(--mono); font-size: 12px;
    color: var(--ink-4); margin-bottom: 32px;
    letter-spacing: 0.02em;
  }
  .post-meta .tag {
    color: var(--accent-ink);
  }
  .post-meta .sep { color: var(--ink-4); opacity: .5; }
  .post-hero {
    width: 100%;
    aspect-ratio: 16 / 8;
    border-radius: 8px;
    margin: 0 0 40px;
    background: var(--surface) center/cover no-repeat;
    border: .5px solid var(--rule-soft);
  }
  .post-title {
    font-family: var(--sans);
    font-size: 36px; line-height: 1.2; letter-spacing: -0.028em;
    font-weight: 600; color: var(--ink);
    margin: 0 0 18px;
    text-wrap: balance;
  }
  .post-sub {
    font-family: var(--sans);
    font-size: 17px; color: var(--ink-3);
    margin: 0 0 56px;
    max-width: 560px;
    text-wrap: pretty;
  }
  .post-footer {
    margin-top: 96px;
    padding-top: 28px;
    border-top: .5px solid var(--rule-soft);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; color: var(--ink-3);
  }
  .post-footer .next {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--ink-2);
  }
  .post-footer .next:hover { color: var(--accent-ink); }

  /* footnote-ish inline highlight */
  .prose mark {
    background: var(--accent-soft);
    color: var(--ink);
    padding: 0 3px;
  }

  /* ── About ─────────────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 96px 1fr;
    gap: 16px 28px;
    align-items: start;
    margin-top: 40px;
  }
  .about-grid dt {
    font-family: var(--mono);
    font-size: 11px; letter-spacing: 0.06em;
    color: var(--ink-4); text-transform: uppercase;
    line-height: 26.25px; /* match dd first-line height */
  }
  .about-grid dd {
    margin: 0; font-size: 15px;
    color: var(--ink-2);
    border-bottom: .5px solid var(--rule-soft);
    padding-bottom: 14px;
  }
  .about-grid dd:last-of-type { border-bottom: 0; }
  .about-grid dd .yr { color: var(--ink-4); margin-right: 10px; font-family: var(--mono); font-size: 12px; }

  /* ── Note (lab) ────────────────────────────────────── */
  .notes { display: flex; flex-direction: column; }

const makeCover = (title, hue, pattern = 'grid') => {

    inner = `<rect width='320' height='200' fill='${c1}'/><path d='M0,160 Q160,40 320,160' fill='none' stroke='${c2}' stroke-width='14' opacity='.7'/><path d='M0,180 Q160,80 320,180' fill='none' stroke='${c3}' stroke-width='6' opacity='.6'/>`;

  }
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 200' width='320' height='200'>${inner}</svg>`;
  return `data:image/svg+xml;utf8,${svg.replace(/#/g, '%23').replace(/"/g, "'")}`;
};

/* ===== ArticleRow (handles all thumbnail variants) ===== */
function ArticleRow({ a, go, tweaks, dateFormat = 'short' }) {
  const showDesc = tweaks.density !== 'compact';
  const dateText = dateFormat === 'mmdd' ? a.date.slice(5) : a.date.slice(2);
  const style = tweaks.thumbStyle;
  const hasCover = !!a.cover;

  const handle = (e) => { e.preventDefault(); go({ name: 'post', slug: a.slug }); };

  // ── Variant: aside (right side small thumbnail; consistent row height)
  if (style === 'aside') {
    return (
      <a className={`row ${hasCover ? '' : 'no-thumb'}`} onClick={handle} href="#">
        <div>
          <div className="article-title">{a.title}</div>
          {showDesc && <span className="article-desc">{a.desc}</span>}
        </div>
        <div className="meta">{dateText}</div>
        {hasCover
          ? <div className="cv has-img" style={{ backgroundImage: `url("${a.cover}")` }} aria-hidden="true" />
          : <div className="cv-spacer" aria-hidden="true" />}
      </a>
    );
  }

  // ── Variant: leading (left thumbnail slot, monogram fallback)
  if (style === 'leading') {
    return (
      <a className="row" onClick={handle} href="#">
        {hasCover
          ? <div className="cv has-img" style={{ backgroundImage: `url("${a.cover}")` }} aria-hidden="true" />
          : <div className="mono-chip">{a.tag}</div>}
        <div>
          <div className="article-title">{a.title}</div>
          {showDesc && <span className="article-desc">{a.desc}</span>}
        </div>
        <div className="meta">{dateText}</div>
      </a>
    );
  }

  // ── Variant: inline (dot + hover preview)
  if (style === 'inline') {
    return (
      <a className="row" onClick={handle} href="#">
        <div>
          <div className="article-title">
            {hasCover && <span className="has-cover-dot" aria-label="cover available" />}
            {a.title}
          </div>
          {showDesc && <span className="article-desc">{a.desc}</span>}
        </div>
        <div className="meta">{dateText}</div>
        {hasCover && (
          <div className="hover-preview" style={{ backgroundImage: `url("${a.cover}")` }} aria-hidden="true" />
        )}
      </a>
    );
  }

  // ── Variant: magazine (wide card for cover, plain row for others)
  if (style === 'magazine') {
    if (hasCover) {
      return (
        <a className="row with-cover" onClick={handle} href="#">
          <div className="cv has-img mag-cover" style={{ backgroundImage: `url("${a.cover}")` }} aria-hidden="true" />
          <div className="mag-body">
            <div>
              <div className="article-title">{a.title}</div>
              {showDesc && <span className="article-desc">{a.desc}</span>}
            </div>
            <div className="meta">{dateText}</div>
          </div>
        </a>
      );
    }
    return (
      <a className="row" onClick={handle} href="#">
        <div>
          <div className="article-title">{a.title}</div>
          {showDesc && <span className="article-desc">{a.desc}</span>}
        </div>
        <div className="meta">{dateText}</div>
      </a>
    );
  }

  // ── Variant: peek (right-edge sliver expands on hover)
  if (style === 'peek') {
    return (
      <a className="row" onClick={handle} href="#">
        <div>
          <div className="article-title">{a.title}</div>
          {showDesc && <span className="article-desc">{a.desc}</span>}
        </div>
        <div className="meta">{dateText}</div>
        <div
          className={`peek-strip ${hasCover ? 'has-img' : 'empty'}`}
          style={hasCover ? { backgroundImage: `url("${a.cover}")` } : undefined}
          aria-hidden="true"
        />
      </a>
    );
  }

  // ── Default: original (no thumbnail handling)
  return (
    <a className="row" onClick={handle} href="#">
      <div>
        <div className="article-title">{a.title}</div>
        {showDesc && <span className="article-desc">{a.desc}</span>}
      </div>
      <div className="meta">{dateText}</div>

  );
}

      <div className="code-block">
        <div className="filename"><span className="lang">tsx</span><span>components/Button.tsx</span></div>
        <pre><code><span className="tk-c">{`// 변경에 약한 신호가 보인다`}</span>{`\n`}
<span className="tk-k">type</span>{` `}<span className="tk-t">ButtonProps</span>{` = {`}{`\n`}
{`  `}<span className="tk-f">variant</span>{`: `}<span className="tk-s">'primary'</span>{` | `}<span className="tk-s">'ghost'</span>{` | `}<span className="tk-s">'danger'</span>{`;`}{`\n`}
{`  `}<span className="tk-f">size</span>{`?: `}<span className="tk-s">'sm'</span>{` | `}<span className="tk-s">'md'</span>{` | `}<span className="tk-s">'lg'</span>{`;`}{`\n`}
{`  `}<span className="tk-f">loading</span>{`?: `}<span className="tk-t">boolean</span>{`;`}{`\n`}
{`  `}<span className="tk-f">loadingText</span>{`?: `}<span className="tk-t">string</span>{`;     `}<span className="tk-c">{`// loading=true일 때만 의미 있음`}</span>{`\n`}
{`  `}<span className="tk-f">iconLeft</span>{`?: `}<span className="tk-t">ReactNode</span>{`;`}{`\n`}
{`  `}<span className="tk-f">iconRight</span>{`?: `}<span className="tk-t">ReactNode</span>{`;`}{`\n`}
{`  `}<span className="tk-f">fullWidth</span>{`?: `}<span className="tk-t">boolean</span>{`;     `}<span className="tk-c">{`// 진짜 컴포넌트의 책임?`}</span>{`\n`}
{`  `}<span className="tk-f">href</span>{`?: `}<span className="tk-t">string</span>{`;            `}<span className="tk-c">{`// 사실 이건 다른 컴포넌트다`}</span>{`\n`}
{`};`}</code></pre>

      <div className="code-block">

        <pre><code><span className="tk-k">type</span>{` `}<span className="tk-t">ButtonProps</span>{` = {`}{`\n`}
{`  `}<span className="tk-f">tone</span>{`?: `}<span className="tk-s">'neutral'</span>{` | `}<span className="tk-s">'accent'</span>{` | `}<span className="tk-s">'danger'</span>{`;`}{`\n`}
{`  `}<span className="tk-f">children</span>{`: `}<span className="tk-t">ReactNode</span>{`;`}{`\n`}
{`};`}{`\n\n`}
<span className="tk-k">export function</span>{` `}<span className="tk-f">Button</span>{`({ tone = `}<span className="tk-s">'neutral'</span>{`, children }: `}<span className="tk-t">ButtonProps</span>{`) {`}{`\n`}
{`  `}<span className="tk-k">return</span>{` (`}{`\n`}

      <p>
        <kbd>iconLeft</kbd>, <kbd>iconRight</kbd> 같은 prop 대신

/* ===== app ===== */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "bodyFont": "sans",
  "measure": 680,
  "fontSize": 17,
  "accentHue": 140,
  "density": "regular",
  "motion": true,
  "thumbStyle": "aside"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState({ name: 'home' });

  React.useEffect(() => {
    document.body.dataset.theme = t.theme;
    document.body.dataset.bodyFont = t.bodyFont;
    document.body.dataset.motion = t.motion ? 'on' : 'off';
    const r = document.documentElement.style;
    r.setProperty('--measure', t.measure + 'px');
    r.setProperty('--fs-body', t.fontSize + 'px');
    const isDark = t.theme === 'dark';
    r.setProperty('--accent', `oklch(${isDark ? '0.78' : '0.58'} ${isDark ? '0.10' : '0.13'} ${t.accentHue})`);
    r.setProperty('--accent-soft', `oklch(${isDark ? '0.78' : '0.58'} ${isDark ? '0.10' : '0.13'} ${t.accentHue} / ${isDark ? '.14' : '.16'})`);
    r.setProperty('--accent-ink', `oklch(${isDark ? '0.85' : '0.44'} ${isDark ? '0.09' : '0.12'} ${t.accentHue})`);
  }, [t]);

  const go = (next) => {
    setRoute(next);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  let view = null;
  if (route.name === 'home') view = <Home go={go} tweaks={t} />;
  else if (route.name === 'articles') view = <Articles go={go} tweaks={t} />;
  else if (route.name === 'post') view = <Post slug={route.slug} go={go} />;
  else if (route.name === 'about') view = <About />;
  else if (route.name === 'note') view = <Note />;

  const navItem = (key, label) => (
    <button aria-current={route.name === key || (key === 'articles' && route.name === 'post') ? 'page' : undefined}
            onClick={() => go({ name: key })}>{label}</button>
  );

  return (
    <>
      <div className="shell">
        <header className="top">
          <a className="brand" href="#" onClick={(e) => { e.preventDefault(); go({ name: 'home' }); }}>
            <span className="dot"></span>
            {SITE.name}
          </a>
          <nav className="nav">
            {navItem('articles', 'Articles')}
            {navItem('note', 'Note')}
            {navItem('about', 'About')}
          </nav>
        </header>

        <main key={route.name + (route.slug || '')}>{view}</main>

        <footer className="foot">
          <span>© 2026 {SITE.name}</span>
          <span className="links">
            {SITE.links.map(l => (
              <a key={l.label} href={l.href} onClick={(e) => e.preventDefault()}>{l.label}</a>
            ))}
            <a href="System.html">System</a>
          </span>
        </footer>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme}
                    options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]}
                    onChange={(v) => setTweak('theme', v)} />
        <TweakSlider label="Accent hue" value={t.accentHue} min={90} max={170} unit="°"
                     onChange={(v) => setTweak('accentHue', v)} />

        <TweakSection label="Reading" />
        <TweakRadio label="Body font" value={t.bodyFont}
                    options={[{ value: 'sans', label: 'Sans' }, { value: 'serif', label: 'Serif' }]}
                    onChange={(v) => setTweak('bodyFont', v)} />
        <TweakSlider label="Body size" value={t.fontSize} min={15} max={20} unit="px"
                     onChange={(v) => setTweak('fontSize', v)} />
        <TweakSlider label="Measure" value={t.measure} min={620} max={780} step={10} unit="px"
                     onChange={(v) => setTweak('measure', v)} />

        <TweakSection label="List" />
        <TweakSelect label="Thumbnails" value={t.thumbStyle}
                     options={[
                       { value: 'none', label: 'None — text only' },
                       { value: 'aside', label: 'Aside — small square right' },
                       { value: 'leading', label: 'Leading — left slot + monogram' },
                       { value: 'inline', label: 'Inline — dot + hover preview' },
                       { value: 'magazine', label: 'Magazine — wide cover row' },
                       { value: 'peek', label: 'Peek — edge sliver, expand on hover' },
                     ]}
                     onChange={(v) => setTweak('thumbStyle', v)} />
        <TweakRadio label="Density" value={t.density}
                    options={[{ value: 'compact', label: 'Compact' }, { value: 'regular', label: 'Regular' }]}
                    onChange={(v) => setTweak('density', v)} />

        <TweakSection label="Misc" />
        <TweakToggle label="Subtle motion" value={t.motion}
                     onChange={(v) => setTweak('motion', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
